<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - EzzeBuy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="{{ url_for('login') }}" class="navbar-brand">
                <i class="fas fa-boxes"></i>
                EzzeBuy
            </a>
            <ul class="navbar-nav">
                <li><a href="{{ url_for('login') }}" class="nav-link active">Sign In</a></li>
                <li><a href="{{ url_for('signup') }}" class="nav-link">Sign Up</a></li>
            </ul>
        </div>
    </nav>

    <div class="main-container">
        <div class="card" style="max-width: 520px; margin: 2rem auto;">
            <div class="card-header">
                <h1 class="card-title"><i class="fas fa-right-to-bracket text-primary"></i> Sign In</h1>
                <p class="card-subtitle">Welcome back! Access your inventory dashboard.</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert {{ 'alert-danger' if category == 'error' else 'alert-success' }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input id="username" class="form-control" type="text" name="username" placeholder="Enter username" required>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input id="password" class="form-control" type="password" name="password" placeholder="Enter password" required>
                </div>

                <button class="btn btn-primary btn-lg" style="width: 100%;" type="submit">
                    <i class="fas fa-right-to-bracket"></i>
                    Sign In
                </button>
            </form>

            <p class="text-center" style="margin-top: 1.25rem;">
                New here?
                <a href="{{ url_for('signup') }}" style="font-weight: 600;">Create an account</a>
            </p>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
